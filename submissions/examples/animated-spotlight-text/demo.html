<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Spotlight Text</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 1000px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            font-family: system-ui;
        }
        .demo-section {
            margin: 3rem 0;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Animated Spotlight Text</h1>
    
    <div class="demo-section">
        <h2 class="ease-spotlight-text">EPIC CINEMATIC</h2>
    </div>

    <div class="demo-section">
        <h2 class="ease-spotlight-text ease-spotlight-fast">FAST REVEAL</h2>
    </div>

    <div class="demo-section">
        <h2 class="ease-spotlight-text ease-spotlight-slow">DRAMATIC ENTRANCE</h2>
    </div>

    <div class="demo-section">
        <h2 class="ease-spotlight-text ease-spotlight-glow">NEON SPOTLIGHT</h2>
    </div>

    <div class="demo-section">
        <h2 class="ease-spotlight-text ease-spotlight-blue">OCEAN DEEP</h2>
    </div>

    <div class="demo-section">
        <h2 class="ease-spotlight-text ease-spotlight-gold">GOLD EDITION</h2>
    </div>

    <div class="demo-section">
        <div class="ease-spotlight-text-container">
            <span class="ease-spotlight-word">SPOTLIGHT</span>
            <span class="ease-spotlight-word" style="animation-delay: 0.2s;">ON</span>
            <span class="ease-spotlight-word" style="animation-delay: 0.4s;">EACH</span>
            <span class="ease-spotlight-word" style="animation-delay: 0.6s;">WORD</span>
        </div>
    </div>

    <div class="note">
        💡 Text is revealed by a moving spotlight gradient. Each word can be animated independently!
    </div>
</div>
</body>
</html>
