<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Stack of Photos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 900px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 Animated Stack of Photos</h1>
    
    <div class="demo-grid">
        <div class="ease-photo-stack">
            <div class="ease-photo" style="background: linear-gradient(135deg, #6c63ff, #a855f7);">📷 Photo 1</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">📷 Photo 2</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #06b6d4, #10b981);">📷 Photo 3</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">📷 Photo 4</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #8b5cf6, #6c63ff);">📷 Photo 5</div>
        </div>

        <div class="ease-photo-stack ease-stack-fan">
            <div class="ease-photo" style="background: linear-gradient(135deg, #6c63ff, #a855f7);">🏔️ Mountain</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">🌊 Ocean</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #06b6d4, #10b981);">🌲 Forest</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">🏜️ Desert</div>
        </div>
    </div>

    <div class="demo-grid">
        <div class="ease-photo-stack ease-stack-spread">
            <div class="ease-photo" style="background: linear-gradient(135deg, #6c63ff, #a855f7);">✨ Memory 1</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">✨ Memory 2</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #06b6d4, #10b981);">✨ Memory 3</div>
        </div>

        <div class="ease-photo-stack ease-stack-raised">
            <div class="ease-photo" style="background: linear-gradient(135deg, #6c63ff, #a855f7);">🏆 Winner</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">⭐ Featured</div>
            <div class="ease-photo" style="background: linear-gradient(135deg, #06b6d4, #10b981);">💎 Premium</div>
        </div>
    </div>

    <div class="note">
        💡 Hover over any photo stack to see photos fan out, spread apart, or raise up!
    </div>
</div>
</body>
</html>
